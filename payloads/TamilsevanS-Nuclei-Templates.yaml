## Generic Template - AWS S3 Bucket Misconfiguration
id: aws-s3-bucket-detect
info:
  name: AWS S3 Bucket Detection
  author: Tamilsevan S
  severity: info
  tags: aws,s3,bucket,misconfig

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    extractors:
      - type: regex
        regex:
          - "s3://[a-z0-9.-]+"
          - "S3://[a-z0-9.-]+"

## Generic Template - Sensitive File Disclosure
id: sensitive-files-disclosure
info:
  name: Sensitive File Disclosure
  author: Tamilsevan S
  severity: high
  tags: exposure,sensitive,files

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.git/config"
      - "{{BaseURL}}/config.json"
      - "{{BaseURL}}/config.xml"
      - "{{BaseURL}}/backup.sql"
      - "{{BaseURL}}/database.sql"
      - "{{BaseURL}}/dump.sql"
      - "{{BaseURL}}/backup.tar.gz"
      - "{{BaseURL}}/backup.zip"
    matchers:
      - type: word
        words:
          - "DB_HOST"
          - "DB_PASSWORD"
          - "APP_KEY"
          - "AWS_ACCESS_KEY_ID"
        condition: or
